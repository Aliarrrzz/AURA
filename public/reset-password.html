<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Reset Access Key</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #030407;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow-x: hidden;
            margin: 0;
            padding: 40px 0;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 20%, #1a0b2e 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, #061a1a 0%, transparent 40%);
            z-index: -1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .reveal {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #dynamic-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.35);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.4;
            pointer-events: none;
        }

        .auth-card {
            background: rgba(13, 17, 23, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 1rem 1.25rem;
            color: white;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            outline: none;
            border-color: #00F2FF;
            background: rgba(0, 242, 255, 0.04);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            transform: scale(1.01);
        }

        .label-style {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.6rem;
            margin-left: 0.2rem;
        }

        .btn-submit {
            width: 100%;
            background: white;
            color: black;
            padding: 1.1rem;
            border-radius: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.4s;
            margin-top: 1.5rem;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #00F2FF;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.3);
        }

        .aura-msg {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1.5rem;
            display: none;
        }

        .msg-error {
            background: rgba(248, 113, 113, 0.05);
            color: #f87171;
            border-left: 3px solid #f87171;
        }

        .msg-success {
            background: rgba(0, 242, 255, 0.05);
            color: #00F2FF;
            border-left: 3px solid #00F2FF;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <div id="dynamic-glow"></div>

    <div class="relative w-full max-w-[500px] px-6 reveal">
        <div class="flex flex-col items-center mb-10">
            <div
                class="bg-black w-14 h-14 rounded-full flex items-center justify-center border border-white/10 shadow-xl mb-4 transition-transform duration-500 hover:rotate-90">
                <img src="https://i.postimg.cc/5NpdTNY8/A3fa9d42040054ea1b982ca73218be2f33-png.jpg" alt="Logo"
                    class="w-10 h-10 object-cover rounded-full">
            </div>
            <span class="text-3xl font-black text-white tracking-tighter italic">AURA<span
                    class="text-[#00F2FF]">.</span></span>
        </div>

        <div class="auth-card">
            <h2 class="text-xl font-bold text-left mb-6 text-white/90">Reset Access Key</h2>

            <div id="message-box" class="aura-msg"></div>

            <form id="reset-form" class="space-y-4">
                <div>
                    <label class="label-style">New Access Key</label>
                    <div class="relative">
                        <input type="password" id="new-pass" class="input-field aura-input pr-10" placeholder="••••••••"
                            required>
                        <button type="button" onclick="togglePass('new-pass', 'eye-1')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-[#00F2FF] transition-all">
                            <svg id="eye-1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="label-style">Confirm New Key</label>
                    <div class="relative">
                        <input type="password" id="conf-pass" class="input-field aura-input pr-10"
                            placeholder="••••••••" required>
                        <button type="button" onclick="togglePass('conf-pass', 'eye-2')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-[#00F2FF] transition-all">
                            <svg id="eye-2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="pass-strength" class="text-[10px] font-bold uppercase tracking-wider ml-1 text-slate-500">
                    Security: Awaiting new key
                </div>

                <button type="submit" id="submit-btn" class="btn-submit">
                    Update Identity
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePass(id, iconId) {
            const input = document.getElementById(id);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.style.color = "#00F2FF";
            } else {
                input.type = "password";
                icon.style.color = "";
            }
        }

        const newPass = document.getElementById('new-pass');
        const confPass = document.getElementById('conf-pass');
        const glow = document.getElementById('dynamic-glow');
        const strengthMsg = document.getElementById('pass-strength');

        function updateAura() {
            const val = newPass.value;
            const isMatch = val === confPass.value && val !== "";
            let filled = (val.length > 0 ? 0.5 : 0) + (confPass.value.length > 0 ? 0.5 : 0);

            if (val.length < 8 && val.length > 0) {
                strengthMsg.innerText = "Security: Too Short";
                strengthMsg.style.color = "#f87171";
            } else if (isMatch) {
                strengthMsg.innerText = "Security: Verified";
                strengthMsg.style.color = "#00F2FF";
                glow.style.background = `radial-gradient(circle, rgba(0, 242, 255, 0.3) 0%, transparent 70%)`;
            }

            const scale = 0.35 + (filled * 1.8);
            glow.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        [newPass, confPass].forEach(i => i.addEventListener('input', updateAura));

        document.getElementById('reset-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const msgBox = document.getElementById('message-box');

            if (newPass.value !== confPass.value) {
                msgBox.innerHTML = "Keys do not match!";
                msgBox.className = "aura-msg msg-error";
                msgBox.style.display = "flex";
                return;
            }

            if (newPass.value.length < 8) {
                msgBox.innerHTML = "Password must be at least 8 characters.";
                msgBox.className = "aura-msg msg-error";
                msgBox.style.display = "flex";
                return;
            }

            const token = new URLSearchParams(window.location.search).get("token");

            if (!token) {
                msgBox.innerHTML = "Invalid reset link.";
                msgBox.className = "aura-msg msg-error";
                msgBox.style.display = "flex";
                return;
            }

            try {
                const res = await fetch("http://localhost:3000/api/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, password: newPass.value })
                });

                const data = await res.json();

                if (res.ok) {
                    msgBox.innerHTML = "Identity Updated. Redirecting...";
                    msgBox.className = "aura-msg msg-success";
                    msgBox.style.display = "flex";
                    glow.style.transform = `translate(-50%, -50%) scale(4)`;
                    glow.style.opacity = "1";
                    setTimeout(() => window.location.href = "login.html", 2000);
                } else {
                    msgBox.innerHTML = data.error || "Reset failed.";
                    msgBox.className = "aura-msg msg-error";
                    msgBox.style.display = "flex";
                }
            } catch (err) {
                msgBox.innerHTML = "Connection error. Try again.";
                msgBox.className = "aura-msg msg-error";
                msgBox.style.display = "flex";
            }
        });
    </script>
</body>

</html>

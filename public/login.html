<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #030407;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            margin: 0;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 10% 20%, #1a0b2e 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, #061a1a 0%, transparent 40%);
            z-index: -1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .reveal {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #dynamic-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.35);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.4;
            pointer-events: none;
        }

        .login-card {
            background: rgba(13, 17, 23, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 1rem 1.25rem;
            color: white;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            outline: none;
            border-color: #00F2FF;
            background: rgba(0, 242, 255, 0.04);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .label-style {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.6rem;
            margin-left: 0.2rem;
        }

        .custom-checkbox {
            appearance: none;
            width: 1.1rem;
            height: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.4rem;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }

        .custom-checkbox:checked {
            background: #00F2FF;
            border-color: #00F2FF;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .custom-checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: black;
            font-size: 0.75rem;
            font-weight: 900;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .btn-submit {
            width: 100%;
            background: white;
            color: black;
            padding: 1.1rem;
            border-radius: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.4s;
            margin-top: 0.5rem;
        }

        .btn-submit:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-submit:not(:disabled):hover {
            background: #00F2FF;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.3);
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.8rem;
            border-radius: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        #message-box {
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 0;
            opacity: 0;
        }

        #message-box.show {
            max-height: 100px;
            opacity: 1;
            margin-bottom: 1.5rem;
        }

        .aura-msg {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg-error {
            background: rgba(248, 113, 113, 0.05);
            color: #f87171;
            box-shadow: 0 0 15px rgba(248, 113, 113, 0.1);
            border-left: 3px solid #f87171;
        }

        .msg-success {
            background: rgba(0, 242, 255, 0.05);
            color: #00F2FF;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            border-left: 3px solid #00F2FF;
        }

        .msg-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Shake Animation for Errors */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            75% {
                transform: translateX(8px);
            }
        }

        .shake-effect {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>

<body>

    <div class="bg-mesh"></div>
    <div id="dynamic-glow"></div>

    <div class="relative w-full max-w-[500px] px-6 reveal">
        <div class="flex flex-col items-center mb-10">
            <div
                class="bg-black w-14 h-14 rounded-full flex items-center justify-center border border-white/10 shadow-xl mb-4 transition-transform duration-500 hover:rotate-90">
                <img src="https://i.postimg.cc/5NpdTNY8/A3fa9d42040054ea1b982ca73218be2f33-png.jpg" alt="Logo"
                    class="w-10 h-10 object-cover rounded-full">
            </div>
            <span class="text-3xl font-black text-white tracking-tighter italic">AURA<span
                    class="text-[#00F2FF]">.</span></span>
        </div>

        <div class="login-card">
            <h2 class="text-xl font-bold text-left mb-6 text-white/90">Identity Verification</h2>

            <div class="grid grid-cols-1 gap-4 mb-8">
                <button class="social-btn"><img src="https://www.google.com/favicon.ico" class="w-4 h-4">
                    Google</button>
            </div>
            <div id="message-box"></div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="label-style">Email Address</label>
                    <input name="email" type="email" class="input-field aura-input" placeholder="nexus@domain.com"
                        required>
                </div>

                <div>
                    <div class="flex justify-between mb-1">
                        <label class="label-style">Password</label>
                        <a href="forgot.html"
                            class="text-[10px] text-[#8B5CF6] font-bold hover:underline tracking-widest uppercase">Forgot Password?</a>
                    </div>
                    <div class="relative group">
                        <input name="password" type="password" id="password-input" class="input-field aura-input pr-12"
                            placeholder="••••••••" required>
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-[#00F2FF] transition-all">
                            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center gap-3 py-1">
                    <input type="checkbox" id="remember" class="custom-checkbox">
                    <label for="remember"
                        class="text-[11px] text-slate-400 cursor-pointer select-none uppercase font-bold tracking-wider">
                        Remember Me (30 days)
                    </label>
                </div>

                <button type="submit" id="submit-btn" class="btn-submit" disabled>
                    Enter Nexus
                </button>
            </form>
        </div>

        <p class="text-center mt-8 text-sm text-slate-500">
            Unrecognized entity? <a href="signup.html" class="text-[#00F2FF] font-black hover:underline">Create
                Identity</a>
        </p>
    </div>

    <script>
        // ======================= AURA EFFECT LOGIC =======================
        const inputs = document.querySelectorAll('.aura-input');
        const glow = document.getElementById('dynamic-glow');
        const submitBtn = document.getElementById('submit-btn');

        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('eye-icon');
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        function updateAura() {
            let filled = 0;
            inputs.forEach(i => { if (i.value.trim().length > 0) filled++; });

            const progress = filled / inputs.length;
            glow.style.transform = `translate(-50%, -50%) scale(${0.35 + (progress * 1.8)})`;
            glow.style.opacity = 0.4 + (progress * 0.4);

            if (progress === 1) {
                submitBtn.disabled = false;
                glow.style.background = `radial-gradient(circle, rgba(0, 242, 255, 0.4) 0%, transparent 70%)`;
            } else {
                submitBtn.disabled = true;
                glow.style.background = `radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%)`;
            }
        }

        inputs.forEach(input => {
            input.addEventListener('input', updateAura);
        });
        //======================= END OF AURA EFFECT LOGIC ======================
    </script>
    <script>
        // ======================= LOGIN SUBMIT LOGIC =======================
        const loginCard = document.querySelector('.login-card');

        function showAuraMessage(text, type = 'error') {
            const box = document.getElementById('message-box');
            const errorIcon = `<svg class="msg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            const successIcon = `<svg class="msg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;

            box.innerHTML = `
                <div class="aura-msg msg-${type}">
                    ${type === 'success' ? successIcon : errorIcon}
                    <span>${text}</span>
                </div>`;

            box.classList.add('show');
            if (type === 'error') {
                setTimeout(() => box.classList.remove('show'), 5000);
            }
        }

        document.getElementById("login-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.querySelector('input[name="email"]').value;
            const password = document.querySelector('input[name="password"]').value;

            try {
                const res = await fetch("http://localhost:3000/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // ذخیره‌سازی
                    localStorage.setItem("accessToken", data.accessToken);
                    localStorage.setItem("username", data.user.username);
                    localStorage.setItem("avatar", data.user.avatar);

                    showAuraMessage("Identity Confirmed. Syncing...", "success");

                    // غیرفعال کردن دکمه برای جلوگیری از کلیک مجدد
                    const submitBtn = e.target.querySelector('button[type="submit"]');
                    if (submitBtn) {
                        submitBtn.style.background = "#00F2FF";
                        submitBtn.innerText = "Access Granted";
                        submitBtn.disabled = true;
                    }

                    setTimeout(() => {
                        window.location.replace("main.html"); // استفاده از replace بهتر است
                    }, 1000);

                } else {
                    showAuraMessage(data.error || "Verification Failed", "error");
                    loginCard.classList.add('shake-effect');
                    setTimeout(() => loginCard.classList.remove('shake-effect'), 400);
                }
            } catch (err) {
                // فقط زمانی ارور بده که واقعاً ارتباط قطع شده باشه و دیتایی ذخیره نشده باشه
                if (!localStorage.getItem("accessToken")) {
                    console.error("Login Error:", err);
                    showAuraMessage("Neural Link Interrupted.", "error");
                }
            }
        });
    </script>
</body>

</html>

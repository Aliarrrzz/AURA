<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #030407;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            margin: 0;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 10% 20%, #1a0b2e 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, #061a1a 0%, transparent 40%);
            z-index: -1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .reveal {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #dynamic-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.35);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.4;
            pointer-events: none;
        }

        .login-card {
            background: rgba(13, 17, 23, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 1rem 1.25rem;
            color: white;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            outline: none;
            border-color: #00F2FF;
            background: rgba(0, 242, 255, 0.04);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .label-style {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.6rem;
            margin-left: 0.2rem;
        }

        .custom-checkbox {
            appearance: none;
            width: 1.1rem;
            height: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.4rem;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }

        .custom-checkbox:checked {
            background: #00F2FF;
            border-color: #00F2FF;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .custom-checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: black;
            font-size: 0.75rem;
            font-weight: 900;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .btn-submit {
            width: 100%;
            background: white;
            color: black;
            padding: 1.1rem;
            border-radius: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.4s;
            margin-top: 0.5rem;
        }

        .btn-submit:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-submit:not(:disabled):hover {
            background: #00F2FF;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.3);
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.8rem;
            border-radius: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <div class="bg-mesh"></div>
    <div id="dynamic-glow"></div>

    <div class="relative w-full max-w-[500px] px-6 reveal">
        <div class="flex flex-col items-center mb-10">
            <div
                class="bg-[#8B5CF6] w-14 h-14 rounded-2xl flex items-center justify-center shadow-[0_0_40px_rgba(139,92,246,0.3)] mb-4">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                    <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" />
                </svg>
            </div>
            <span class="text-3xl font-black text-white tracking-tighter italic">AURA<span
                    class="text-[#00F2FF]">.</span></span>
        </div>

        <div class="login-card">
            <h2 class="text-xl font-bold text-left mb-6 text-white/90">Identity Verification</h2>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button class="social-btn"><img src="https://www.google.com/favicon.ico" class="w-4 h-4">
                    Google</button>
                <button class="social-btn">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 1024 1024">
                        <path
                            d="M747.4 535.7c-.4-120.4 98.6-178.2 103.1-181.1-55.9-81.7-142.7-92.8-173.9-94.1-74.5-7.5-145.3 44.1-183.1 44.1-37.7 0-95.6-43.2-158.5-42.1-82.7 1.2-158.2 48.1-200.7 121.9-85.9 149.1-21.9 369.3 61.3 489.5 40.7 58.7 89.1 124.5 152.7 122.1 61.1-2.4 84.2-39.4 158.1-39.4 73.8 0 94.6 39.4 158.2 38.1 64.7-1.2 107.4-59.9 147.7-118.7 46.5-68.2 65.6-134.2 66.6-137.6-.8-.3-130.6-50.1-131.5-199.9zM621.9 220.1c33.3-40.3 55.8-96.3 49.6-152.2-48.1 1.9-106.3 32-140.7 72.3-30.9 35.8-58 92.7-50.8 147.2 53.7 4.2 108.6-27 141.9-67.3z" />
                    </svg>
                    Apple
                </button>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="label-style">Email Address</label>
                    <input type="email" class="input-field aura-input" placeholder="nexus@domain.com" required>
                </div>

                <div>
                    <div class="flex justify-between mb-1">
                        <label class="label-style">Access Key</label>
                        <a href="forgot.html"
                            class="text-[10px] text-[#8B5CF6] font-bold hover:underline tracking-widest uppercase">Lost
                            Key?</a>
                    </div>
                    <div class="relative group">
                        <input type="password" id="password-input" class="input-field aura-input pr-12"
                            placeholder="••••••••" required>
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-[#00F2FF] transition-all">
                            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center gap-3 py-1">
                    <input type="checkbox" id="remember" class="custom-checkbox">
                    <label for="remember"
                        class="text-[11px] text-slate-400 cursor-pointer select-none uppercase font-bold tracking-wider">
                        Maintain session for 30 cycles
                    </label>
                </div>

                <button type="submit" id="submit-btn" class="btn-submit" disabled>
                    Enter Nexus
                </button>
            </form>
        </div>

        <p class="text-center mt-8 text-sm text-slate-500">
            Unrecognized entity? <a href="signup.html" class="text-[#00F2FF] font-black hover:underline">Create
                Identity</a>
        </p>
    </div>

    <script>
        const inputs = document.querySelectorAll('.aura-input');
        const glow = document.getElementById('dynamic-glow');
        const submitBtn = document.getElementById('submit-btn');

        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('eye-icon');
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        function updateAura() {
            let filled = 0;
            inputs.forEach(i => { if (i.value.trim().length > 0) filled++; });

            const progress = filled / inputs.length;
            glow.style.transform = `translate(-50%, -50%) scale(${0.35 + (progress * 1.8)})`;
            glow.style.opacity = 0.4 + (progress * 0.4);

            if (progress === 1) {
                submitBtn.disabled = false;
                glow.style.background = `radial-gradient(circle, rgba(0, 242, 255, 0.4) 0%, transparent 70%)`;
            } else {
                submitBtn.disabled = true;
                glow.style.background = `radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%)`;
            }
        }

        inputs.forEach(input => {
            input.addEventListener('input', updateAura);
        });
    </script>
</body>

</html>
